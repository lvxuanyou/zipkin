name: zipkin:3.6.1

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: zipkin-3.6.1

    steps:
    - uses: actions/checkout@v4
    - name: Build the zipkin image
      run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
